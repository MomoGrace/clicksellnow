<div class="container">
<div class="tool-box">

<h1>Merge PDF Files</h1>
<p>Combine multiple PDF files into a single document in your browser.</p>

<input type="file" id="pdfFiles" multiple accept="application/pdf">
<br>

<button onclick="mergePDF()">Merge PDF</button>

<p style="color:#28a745; font-size:14px; margin-top:10px;">
✓ Files are processed locally in your browser. No upload required.
</p>

<p class="note" id="message">Select PDF files to merge.</p>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
async function mergePDF() {
  const files = document.getElementById("pdfFiles").files;
  const message = document.getElementById("message");

  if (!files.length) {
    message.textContent = "Please select PDF files.";
    return;
  }

  message.textContent = "Merging PDFs...";

  const mergedPdf = await PDFLib.PDFDocument.create();

  for (const file of files) {
    const bytes = await file.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(bytes);

    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
    copiedPages.forEach((page) => mergedPdf.addPage(page));
  }

  const pdfBytes = await mergedPdf.save();

  const blob = new Blob([pdfBytes], { type: "application/pdf" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "merged.pdf";
  link.click();

  message.textContent = "Done! Your merged PDF has been downloaded.";
}
</script>
